name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-grn-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore
        run: dotnet restore RoyalBakeryGrn/RoyalBakeryGrn.csproj

      - name: Publish APK
        run: dotnet publish RoyalBakeryGrn/RoyalBakeryGrn.csproj -c Release -f net9.0-android -o publish/grn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.10
          name: v1.10 - Search Debounce Fix
          body: |
            ## Changes in v1.10
            - **CRITICAL FIX**: Added 250ms debounce to search — prevents crash from rapid layout changes on Android
            - All UI updates now run on MainThread.BeginInvokeOnMainThread
            - Children.Clear() no longer called on every keystroke (only after debounce)
            - Try-catch wraps all layout operations to swallow edge-case errors
            - Both Add GRN and Clearance pages updated

            ## Downloads
            - **RoyalBakeryGRN APK** — Android APK
          files: publish/grn/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryGRN-Android
          path: publish/grn/*.apk

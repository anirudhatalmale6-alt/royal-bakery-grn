name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-grn-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore
        run: dotnet restore RoyalBakeryGrn/RoyalBakeryGrn.csproj

      - name: Publish APK
        run: dotnet publish RoyalBakeryGrn/RoyalBakeryGrn.csproj -c Release -f net9.0-android -o publish/grn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.9
          name: v1.9 - Search Crash Fix (No ListView)
          body: |
            ## Changes in v1.9
            - **CRITICAL FIX**: Completely removed ListView/CollectionView for search dropdowns — replaced with plain VerticalStackLayout + TapGestureRecognizer
            - No data binding, no virtualization, no ItemsSource — just simple native views that are bulletproof on Android
            - Both Add GRN and Stock Management (Clearance) pages use the new approach
            - SearchBar replaced with Entry for better compatibility
            - Results limited to 15 items, each with large touch targets
            - All previous fixes included

            ## Downloads
            - **RoyalBakeryGRN APK** — Android APK
          files: publish/grn/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryGRN-Android
          path: publish/grn/*.apk
